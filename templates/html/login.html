{% load static %}
<!DOCTYPE html>
<link rel="stylesheet" href="{% static 'css/style.css' %}">
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>REGISTRATION PAGE</title>
</head>
<body>
    <form method="post">
        {% csrf_token %}
        <h1>Username:</h1>
        <input type="text" name="username" style="width:500px;height:40px;"><br>

        <h1>Password:</h1>
        <input type="password" name="password" style="width:500px;height:40px;"><br>

        <input class="registrations" type="submit" value="Sign in"><br>
        <h2>Don't have an account? Sign up <a href="{% url 'user_signup' %}">here</a></h2>
    </form>
</body>
</html>
